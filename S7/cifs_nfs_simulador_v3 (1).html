<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:Arial,sans-serif;padding:12px}
.legend-row{display:flex;gap:14px;justify-content:center;padding:8px 0 4px;flex-wrap:wrap}
.legend-item{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
.ll{width:24px;height:2px;border-radius:2px;display:inline-block}
.hint{font-size:11px;color:#444;text-align:center;padding:5px 0}
.mw{display:none;position:relative;background:rgba(0,0,0,.92);border:0.5px solid #2a2a2a;border-radius:12px;padding:18px;margin-top:8px}
.mw.show{display:block}
.mc{background:#111;border:0.5px solid #2a2a2a;border-radius:12px;padding:16px 20px;max-width:620px;margin:0 auto;position:relative}
.mt{font-size:14px;font-weight:bold;color:#fff;margin-bottom:2px}
.ms{font-size:11px;color:#666;margin-bottom:11px}
.mb{font-size:12px;color:#bbb;line-height:1.7}
.mb p{margin-bottom:8px}.mb p:last-child{margin-bottom:0}.mb b{color:#fff}
.cl{font-family:monospace;font-size:11px;background:#151515;border:0.5px solid #2a2a2a;border-radius:4px;padding:4px 9px;margin:5px 0;color:#6ecfb0;display:block}
.bc{background:#0c2a4a;color:#5ab4f5;font-size:10px;font-weight:bold;padding:1px 8px;border-radius:20px;border:0.5px solid #185FA5;display:inline-block;margin:2px}
.bn{background:#04271a;color:#3fd9a0;font-size:10px;font-weight:bold;padding:1px 8px;border-radius:20px;border:0.5px solid #1D9E75;display:inline-block;margin:2px}
.bp{background:#1a1200;color:#d4a017;font-size:10px;font-weight:bold;padding:1px 8px;border-radius:20px;border:0.5px solid #854F0B;display:inline-block;margin:2px}
.cb{position:absolute;top:9px;right:12px;background:none;border:none;font-size:19px;cursor:pointer;color:#555;line-height:1}
.cb:hover{color:#fff}
.tr{margin-bottom:10px}
.si{display:flex;gap:5px;margin-top:11px;border-top:0.5px solid #1a1a1a;padding-top:9px;align-items:center}
.sd{width:6px;height:6px;border-radius:50%;background:#2a2a2a;display:inline-block}
.sd.a{background:#1D9E75}
.nb{display:flex;gap:7px;margin-top:9px;justify-content:flex-end}
.nb button{font-size:11px;padding:4px 12px;cursor:pointer;background:#171717;border:0.5px solid #333;border-radius:6px;color:#bbb}
.nb button:hover{background:#1e1e1e;color:#fff}
.ng{cursor:pointer}
.ng:hover{opacity:.82}
</style>

<script>
const D={
  nas:{title:'Servidor NAS',subtitle:'Synology / TrueNAS · CIFS + NFS simultáneos sobre el mismo RAID',tags:['bc:CIFS TCP 445','bn:NFS TCP 2049','bp:mismo volumen físico'],steps:[
    {h:'El NAS publica dos protocolos simultáneos',b:'<p>El mismo volumen <b>/datos/proyectos</b> se expone por dos pilas independientes:</p><span class="cl">smbd --daemon   → CIFS/SMB  puerto TCP 445</span><span class="cl">nfsd --daemon   → NFS v4    puerto TCP 2049</span><p>Los LEDs del frente confirman actividad de discos. Windows ve el share CIFS; Linux ve el export NFS.</p>'},
    {h:'Autenticación diferente por protocolo',b:'<p><b>CIFS</b>: negocia sesión SMB, autentica via Active Directory + Kerberos. El servidor mantiene token de sesión por cliente.</p><p><b>NFS</b>: sin sesión. Verifica solo la IP origen contra /etc/exports.</p><span class="cl">/etc/exports → /datos/proyectos 192.168.10.0/24(rw,sync)</span>'},
    {h:'Gestión de bloqueos de archivo',b:'<p>CIFS aplica <b>oplocks</b> exclusivos: si Maria abre contrato.docx, Carlos recibe "archivo en uso".</p><p>NFS v4 gestiona bloqueos server-side con <b>delegaciones</b>. NFS v3 usaba lockd en puerto 4045.</p>'}
  ]},
  switch:{title:'Switch Ethernet L2',subtitle:'802.1Q VLAN-aware · 1 Gbps por puerto · hub de la topología',tags:['bp:MAC switching','bp:VLAN 802.1Q'],steps:[
    {h:'El switch no distingue CIFS de NFS',b:'<p>Para el switch, un frame CIFS y uno NFS son tramas Ethernet idénticas:</p><span class="cl">Frame CIFS → destino MAC NAS → puerto 24</span><span class="cl">Frame NFS  → destino MAC NAS → puerto 24</span><p>La diferencia TCP 445 vs 2049 la procesa el servidor destino.</p>'},
    {h:'Segmentación con VLANs recomendada',b:'<span class="cl">VLAN 10 → PCs Windows  (CIFS TCP 445)</span><span class="cl">VLAN 20 → Servidores Linux (NFS TCP 2049)</span><span class="cl">VLAN 30 → NAS storage</span><p>El firewall entre VLANs controla qué protocolo puede acceder al NAS desde cada segmento.</p>'}
  ]},
  win1:{title:'PC Windows — Maria (contabilidad)',subtitle:'Windows 11 Pro · SMB 3.1.1 + Kerberos · dominio AD',tags:['bc:SMB 3.1.1','bp:TCP 445','bp:Kerberos auth'],steps:[
    {h:'Mapeo UNC y negociación SMB',b:'<p>Maria abre el Explorador y teclea:</p><span class="cl">\\\\NAS-CORP\\contabilidad</span><p>Windows envía <b>SMB NEGOTIATE</b> por TCP/445 → acuerda SMB 3.1.1 con cifrado AES-128 del tráfico completo.</p>'},
    {h:'Autenticación Kerberos sin contraseña en red',b:'<span class="cl">TGT → Service Ticket (DC) → presentado al NAS</span><p>Nunca viaja la contraseña por la red. El servidor registra cada acceso para auditoría ISO 27001.</p>'},
    {h:'Oplock exclusivo + Persistent Handles',b:'<span class="cl">Z:\\contabilidad\\balance_Q1.xlsx</span><p>SMB 3.x: si la red cae hasta 60s, la sesión se recupera automáticamente (Persistent Handles). Esta función no existe en NFS estándar.</p>'}
  ]},
  win2:{title:'Laptop Windows — Carlos (gerencia)',subtitle:'Windows 10 Enterprise · dominio AD · misma auth Kerberos',tags:['bc:CIFS/SMB','bp:TCP 445','bp:sesión persistente'],steps:[
    {h:'Permisos por grupo Active Directory',b:'<span class="cl">Gerencia     → leer+escribir en \\contabilidad</span><span class="cl">RRHH         → sin acceso</span><p>Si Carlos intenta abrir balance_Q1.xlsx que tiene Maria abierto → recibe aviso de oplock activo, puede abrir en solo lectura.</p>'},
    {h:'Persistent Handles SMB 3.x',b:'<p>Corte de red de 30s → SMB 3.x mantiene estado de sesión de Carlos hasta 60s. Al restablecerse: recuperación transparente sin pérdida de datos.</p><p>NFS estándar no tiene esta capacidad nativa.</p>'}
  ]},
  linux1:{title:'Ubuntu Server — cluster-node-01',subtitle:'Ubuntu 22.04 LTS · NFS v4 · montaje automático /etc/fstab',tags:['bn:NFS v4','bp:TCP 2049','bp:auth por IP'],steps:[
    {h:'Montaje automático con fstab',b:'<span class="cl">192.168.10.50:/datos/proyectos /mnt/proyectos nfs4 defaults,_netdev 0 0</span><p>Al arrancar, el SO ejecuta mount. El cliente envía RPC al puerto 2049. El NAS verifica la IP en /etc/exports y concede el montaje.</p>'},
    {h:'Sin sesión, autenticación por IP',b:'<span class="cl">ls /mnt/proyectos/</span><span class="cl">cp resultado.csv /mnt/proyectos/resultados/</span><p>NFS+Kerberos (<b>sec=krb5</b>) añade autenticación por usuario para redes no confiables.</p>'},
    {h:'Rendimiento superior de NFS v4',b:'<span class="cl">NFS4 → COMPOUND(OPEN+READ+CLOSE) = 1 RPC</span><span class="cl">CIFS → NEGOTIATE+SESSION+TREE+CREATE+READ = 5 RTTs</span><p>Para transferencias masivas de datos de simulación: NFS v4 puede ser hasta 3x más rápido que CIFS.</p>'}
  ]},
  linux2:{title:'Rocky Linux — cluster-node-02',subtitle:'Rocky Linux 9 · NFS v4 · mismo export del NAS',tags:['bn:NFS v4','bp:TCP 2049','bp:rpcbind 111'],steps:[
    {h:'Lectura simultánea de múltiples nodos',b:'<p>cluster-node-01 y cluster-node-02 montan <b>/mnt/proyectos</b> desde el mismo NAS. Lectura simultánea sin conflicto. Para escritura concurrente se requiere GlusterFS o control a nivel de aplicación.</p>'},
    {h:'Descubrimiento de servicio con rpcbind',b:'<span class="cl">Cliente → UDP 111: ¿puerto de nfsd?</span><span class="cl">rpcbind → TCP 2049</span><span class="cl">Cliente → TCP 2049: MOUNT request</span>'}
  ]},
  linuxclient:{title:'Servidor de apps — Node: appserver',subtitle:'Ubuntu Server · backend Node.js · NFS transparente',tags:['bn:NFS v4','bp:TCP 2049','bp:montaje transparente'],steps:[
    {h:'Backend Node.js leyendo archivos del NAS',b:'<span class="cl">192.168.10.50:/datos/contratos → /app/contratos (NFS)</span><p>El código usa <b>fs.readFile(\'/app/contratos/contrato_123.pdf\')</b> — completamente transparente, no distingue disco local de NAS remoto.</p>'},
    {h:'¿Por qué NFS y no CIFS aquí?',b:'<span class="cl">NFS: cero credenciales, menor overhead, mayor rendimiento</span><span class="cl">CIFS en Linux: requiere cifs-utils + credenciales de dominio</span><p>Para miles de lecturas por hora en Linux, NFS es la elección natural.</p>'}
  ]},
  mixed:{title:'MacBook Pro — Ana (diseño)',subtitle:'macOS Ventura · SMB 3 nativo · NFS disponible · entorno mixto',tags:['bc:SMB nativo macOS','bn:NFS disponible','bp:entorno mixto'],steps:[
    {h:'macOS soporta ambos protocolos nativamente',b:'<p>Finder → <b>Ir → Conectar al servidor</b>:</p><span class="cl">smb://192.168.10.50/diseno       ← CIFS/SMB</span><span class="cl">nfs://192.168.10.50/datos/diseno ← NFS</span><p>macOS Ventura usa SMB 3 por defecto para máxima interoperabilidad con NAS Synology y servidores Windows.</p>'},
    {h:'¿CIFS o NFS para Ana?',b:'<p><b>Empresa con mayoría Windows + AD</b> → Ana autentica con SSO de dominio vía CIFS igual que los demás. Sin configuración extra.</p><p><b>Equipo exclusivo Mac/Linux</b> → NFS más eficiente para archivos grandes de diseño (PSD, AI de varios GB).</p>'}
  ]},
  ad:{title:'Active Directory — Auth centralizada CIFS',subtitle:'Windows Server 2022 · Domain Controller · Kerberos v5 + LDAP',tags:['bc:auth CIFS','bp:Kerberos TCP 88','bp:LDAP TCP 389'],steps:[
    {h:'Flujo Kerberos para autenticación CIFS',b:'<span class="cl">1. Cliente solicita TGT al DC (TCP 88)</span><span class="cl">2. DC emite Service Ticket para el NAS</span><span class="cl">3. NAS valida ticket → acceso concedido</span><p>Nunca viaja la contraseña en texto por la red. Firma criptográfica del DC.</p>'},
    {h:'Diferencia fundamental con NFS',b:'<span class="cl">NFS básico:    IP-based (riesgo IP spoofing)</span><span class="cl">NFS+Kerberos:  sec=krb5 (integrable con AD)</span><span class="cl">CIFS:          usuario+Kerberos (ISO 27001 auditable)</span>'}
  ]},
  rpc:{title:'rpcbind — portmapper NFS Puerto 111',subtitle:'Directorio de servicios RPC · necesario para NFS v3 y v4',tags:['bn:NFS discovery','bp:Puerto 111','bp:Puerto 2049'],steps:[
    {h:'¿Qué hace rpcbind?',b:'<span class="cl">Cliente → UDP 111: "¿Dónde está nfsd?"</span><span class="cl">rpcbind → "nfsd en TCP 2049"</span><span class="cl">Cliente → TCP 2049: MOUNT request</span><p>En NFS v4 el puerto 2049 es fijo, pero rpcbind se mantiene por compatibilidad con v3.</p>'},
    {h:'Puertos a abrir en el firewall para NFS',b:'<span class="cl">TCP/UDP 111  → rpcbind</span><span class="cl">TCP 2049     → nfsd (datos)</span><span class="cl">TCP/UDP 4045 → lockd (NFS v3)</span><p><b>CIFS</b> solo necesita TCP 445 — ventaja clara en entornos con firewalls estrictos.</p>'}
  ]}
};
let CS=[],CI=0;
function showModal(k){
  const d=D[k];if(!d)return;
  document.getElementById('m-title').textContent='▶ '+d.title;
  document.getElementById('m-subtitle').textContent=d.subtitle;
  document.getElementById('m-tags').innerHTML=d.tags.map(t=>{const[c,l]=t.split(':');return'<span class="'+c+'">'+l+'</span>';}).join(' ');
  CS=d.steps;CI=0;render();
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function render(){
  const s=CS[CI];
  document.getElementById('m-body').innerHTML='<p style="font-weight:bold;margin-bottom:7px;color:#fff">'+s.h+'</p>'+s.b;
  document.getElementById('m-steps').innerHTML=CS.map(function(_,i){return'<span class="sd'+(i===CI?' a':'')+'"></span>';}).join('');
  const nav=document.getElementById('m-nav');nav.innerHTML='';
  if(CS.length>1){
    if(CI>0){const b=document.createElement('button');b.textContent='← Anterior';b.onclick=function(){CI--;render();};nav.appendChild(b);}
    if(CI<CS.length-1){const b=document.createElement('button');b.textContent='Siguiente →';b.onclick=function(){CI++;render();};nav.appendChild(b);}
  }
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
</script>
