<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HARDENING // AR Security Simulator</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #000000;
    font-family: Arial, "Helvetica Neue", sans-serif;
    color: #c8faff;
    margin: 0;
    padding: 30px 20px;
    min-height: 100vh;
  }
  .hud-frame {
    max-width: 980px;
    margin: 0 auto;
    border: 1px solid #00f7ff;
    border-radius: 10px;
    padding: 24px;
    background: radial-gradient(circle at 50% 0%, rgba(0,247,255,0.06), rgba(0,0,0,0.95) 70%);
    box-shadow: 0 0 25px rgba(0,247,255,0.35), inset 0 0 40px rgba(0,247,255,0.08);
  }
  h1 {
    text-align: center;
    font-size: 28px;
    letter-spacing: 4px;
    margin: 0 0 4px;
    color: #00f7ff;
    text-shadow: 0 0 8px #00f7ff, 0 0 20px #00f7ff, 0 0 40px rgba(0,247,255,0.6);
  }
  .subtitle {
    text-align: center;
    color: #7df9ff;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 22px;
    text-shadow: 0 0 6px rgba(125,249,255,0.7);
  }
  .scanline {
    height: 2px;
    background: linear-gradient(90deg, transparent, #00f7ff, transparent);
    margin: 0 0 24px;
    box-shadow: 0 0 10px #00f7ff;
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0%{opacity:.3} 50%{opacity:1} 100%{opacity:.3} }

  .status-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .status-box {
    border: 1px solid #ff2bd6;
    border-radius: 6px;
    padding: 10px 18px;
    text-align: center;
    flex: 1;
    min-width: 140px;
    box-shadow: 0 0 12px rgba(255,43,214,0.35), inset 0 0 10px rgba(255,43,214,0.1);
  }
  .status-box.safe {
    border-color: #39ff14;
    box-shadow: 0 0 12px rgba(57,255,20,0.4), inset 0 0 10px rgba(57,255,20,0.12);
  }
  .status-box .label { font-size: 11px; letter-spacing: 1.5px; color: #ff7be0; }
  .status-box.safe .label { color: #8cff8c; }
  .status-box .value {
    font-size: 26px;
    font-weight: bold;
    color: #ff2bd6;
    text-shadow: 0 0 10px #ff2bd6;
    margin-top: 4px;
  }
  .status-box.safe .value {
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14;
  }

  .toggle-btn {
    display: block;
    margin: 0 auto 26px;
    background: transparent;
    border: 2px solid #00f7ff;
    color: #00f7ff;
    font-family: Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 12px 28px;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: 0 0 6px #00f7ff;
    box-shadow: 0 0 15px rgba(0,247,255,0.4);
    transition: all .25s ease;
  }
  .toggle-btn:hover {
    background: rgba(0,247,255,0.12);
    box-shadow: 0 0 25px rgba(0,247,255,0.8);
  }

  .layer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }
  .layer-card {
    border: 1px solid #444;
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    transition: all .3s ease;
    position: relative;
    overflow: hidden;
  }
  .layer-card.vulnerable {
    border-color: #ff2bd6;
    box-shadow: 0 0 14px rgba(255,43,214,0.4), inset 0 0 14px rgba(255,43,214,0.08);
  }
  .layer-card.hardened {
    border-color: #39ff14;
    box-shadow: 0 0 14px rgba(57,255,20,0.45), inset 0 0 14px rgba(57,255,20,0.08);
  }
  .layer-card:hover { transform: translateY(-2px); }

  .layer-title {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .layer-card.vulnerable .layer-title { color: #ff5fe3; text-shadow: 0 0 6px #ff2bd6; }
  .layer-card.hardened .layer-title { color: #5cff5c; text-shadow: 0 0 6px #39ff14; }

  .layer-status {
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .layer-card.vulnerable .layer-status { color: #ff9be8; }
  .layer-card.hardened .layer-status { color: #9bffa0; }

  .layer-detail {
    font-size: 12px;
    line-height: 1.5;
    color: #b0d8dc;
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }
  .layer-card.open .layer-detail {
    max-height: 220px;
    margin-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 8px;
  }
  .layer-detail strong { color: #00f7ff; }

  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
  }
  .layer-card.vulnerable .corner { color: #ff2bd6; }
  .layer-card.hardened .corner { color: #39ff14; }
  .layer-card .corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .layer-card .corner.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
  .layer-card .corner.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
  .layer-card .corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  footer {
    text-align: center;
    margin-top: 26px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #4dd9e0;
    opacity: .7;
  }
</style>
</head>
<body>
<div class="hud-frame">
  <h1>HARDENING</h1>
  <div class="subtitle">SIMULADOR AR // REDUCCIÓN DE SUPERFICIE DE ATAQUE</div>
  <div class="scanline"></div>

  <div class="status-panel">
    <div class="status-box" id="statusBox">
      <div class="label">SUPERFICIE DE ATAQUE</div>
      <div class="value" id="surfaceValue">100%</div>
    </div>
    <div class="status-box" id="riskBox">
      <div class="label">NIVEL DE RIESGO</div>
      <div class="value" id="riskValue">CRÍTICO</div>
    </div>
    <div class="status-box" id="hardenedBox">
      <div class="label">CAPAS ENDURECIDAS</div>
      <div class="value" id="hardenedValue">0/6</div>
    </div>
  </div>

  <button class="toggle-btn" id="globalToggle" onclick="toggleAll()">▶ APLICAR HARDENING A TODAS LAS CAPAS</button>

  <div class="layer-grid" id="grid"></div>

  <footer>CLIC EN CADA CAPA PARA VER DETALLES Y ALTERNAR ESTADO · CONCEPTO: HARDENING DE SISTEMAS</footer>
</div>

<script>
const layers = [
  {
    id: "os",
    title: "1. SISTEMA OPERATIVO",
    vuln: "Servicios innecesarios activos, cuentas por defecto sin cambiar",
    hard: "Servicios mínimos, cuentas default deshabilitadas, parches aplicados",
    detail: "<strong>Hardening de SO:</strong> deshabilitar servicios no usados, eliminar/renombrar cuentas por defecto (admin/root), aplicar parches críticos, configurar políticas de contraseñas robustas y registro de auditoría (logging)."
  },
  {
    id: "net",
    title: "2. RED",
    vuln: "Puertos abiertos sin justificación, sin segmentación VLAN",
    hard: "Firewall con reglas least-privilege, VLANs segmentadas, puertos cerrados",
    detail: "<strong>Hardening de red:</strong> cerrar puertos no usados, implementar listas de control de acceso (ACL), segmentación con VLANs, deshabilitar protocolos inseguros (Telnet, SNMP v1)."
  },
  {
    id: "app",
    title: "3. APLICACIONES",
    vuln: "Versiones desactualizadas, configuración por defecto del proveedor",
    hard: "Versiones parchadas, configuración mínima necesaria, WAF activo",
    detail: "<strong>Hardening de aplicaciones:</strong> actualizar dependencias y frameworks, deshabilitar mensajes de error verbosos en producción, validar entradas, usar WAF (Web Application Firewall)."
  },
  {
    id: "id",
    title: "4. IDENTIDAD Y ACCESO",
    vuln: "Sin MFA, privilegios excesivos (over-privilege)",
    hard: "MFA obligatorio, principio de mínimo privilegio aplicado",
    detail: "<strong>Hardening IAM:</strong> autenticación multifactor (MFA), principio de mínimo privilegio, revisión periódica de accesos, eliminación de cuentas inactivas."
  },
  {
    id: "phys",
    title: "5. SEGURIDAD FÍSICA",
    vuln: "Acceso físico sin control, puertos USB expuestos",
    hard: "Acceso restringido, puertos bloqueados, CCTV y logs de acceso",
    detail: "<strong>Hardening físico:</strong> control de acceso a salas de servidores, bloqueo de puertos USB no autorizados, cifrado de discos en caso de robo del equipo."
  },
  {
    id: "patch",
    title: "6. GESTIÓN DE PARCHES",
    vuln: "Sin ciclo definido de actualización, CVEs sin remediar",
    hard: "Ciclo de parcheo programado, escaneo de vulnerabilidades activo",
    detail: "<strong>Hardening de gestión de parches:</strong> calendario de actualizaciones, escaneo continuo de CVEs (vulnerabilidades conocidas), pruebas en entorno de staging antes de producción."
  }
];

let state = {};
layers.forEach(l => state[l.id] = { hardened: false, open: false });

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  let hardenedCount = 0;

  layers.forEach(l => {
    const s = state[l.id];
    if (s.hardened) hardenedCount++;
    const card = document.createElement("div");
    card.className = "layer-card " + (s.hardened ? "hardened" : "vulnerable") + (s.open ? " open" : "");
    card.onclick = () => { s.open = !s.open; render(); };
    card.innerHTML = `
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="layer-title">${l.title}</div>
      <div class="layer-status">${s.hardened ? "● ENDURECIDO" : "● VULNERABLE"} — clic para alternar</div>
      <div class="layer-detail">
        <div>${s.hardened ? l.hard : l.vuln}</div>
        <div style="margin-top:8px">${l.detail}</div>
        <div style="margin-top:8px; text-align:right;">
          <button onclick="event.stopPropagation(); toggleOne('${l.id}')" style="background:transparent;border:1px solid currentColor;color:inherit;padding:5px 10px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px;cursor:pointer;">
            ${s.hardened ? "REVERTIR A VULNERABLE" : "APLICAR HARDENING"}
          </button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  const pct = Math.round((6 - hardenedCount) / 6 * 100);
  document.getElementById("surfaceValue").textContent = pct + "%";
  document.getElementById("hardenedValue").textContent = hardenedCount + "/6";

  const riskValue = document.getElementById("riskValue");
  const surfaceBox = document.getElementById("statusBox");
  const riskBox = document.getElementById("riskBox");
  const hardenedBox = document.getElementById("hardenedBox");

  if (hardenedCount === 6) {
    riskValue.textContent = "MÍNIMO";
    [surfaceBox, riskBox, hardenedBox].forEach(b => b.classList.add("safe"));
  } else if (hardenedCount >= 3) {
    riskValue.textContent = "MODERADO";
    [surfaceBox, riskBox, hardenedBox].forEach(b => b.classList.remove("safe"));
  } else {
    riskValue.textContent = "CRÍTICO";
    [surfaceBox, riskBox, hardenedBox].forEach(b => b.classList.remove("safe"));
  }
}

function toggleOne(id) {
  state[id].hardened = !state[id].hardened;
  render();
}

function toggleAll() {
  const allHardened = layers.every(l => state[l.id].hardened);
  layers.forEach(l => state[l.id].hardened = !allHardened);
  render();
}

render();
</script>
</body>
</html>
