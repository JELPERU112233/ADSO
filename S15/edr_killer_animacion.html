<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EDR KILLER // Animación de funcionamiento</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #000000;
    font-family: Arial, "Helvetica Neue", sans-serif;
    color: #c8faff;
    margin: 0;
    padding: 30px 20px;
    min-height: 100vh;
  }
  .hud-frame {
    max-width: 980px;
    margin: 0 auto;
    border: 1px solid #ff2bd6;
    border-radius: 10px;
    padding: 24px;
    background: radial-gradient(circle at 50% 0%, rgba(255,43,214,0.06), rgba(0,0,0,0.95) 70%);
    box-shadow: 0 0 25px rgba(255,43,214,0.35), inset 0 0 40px rgba(255,43,214,0.08);
  }
  h1 {
    text-align: center;
    font-size: 26px;
    letter-spacing: 3px;
    margin: 0 0 4px;
    color: #ff2bd6;
    text-shadow: 0 0 8px #ff2bd6, 0 0 20px #ff2bd6, 0 0 40px rgba(255,43,214,0.6);
  }
  .subtitle {
    text-align: center;
    color: #ff9be8;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 18px;
    text-shadow: 0 0 6px rgba(255,155,232,0.7);
  }
  .scanline {
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff2bd6, transparent);
    margin: 0 0 24px;
    box-shadow: 0 0 10px #ff2bd6;
    animation: scan 3s linear infinite;
  }
  @keyframes scan { 0%{opacity:.3} 50%{opacity:1} 100%{opacity:.3} }

  /* ---- Escenario animado ---- */
  .stage {
    position: relative;
    height: 320px;
    border: 1px solid #333;
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.015);
  }
  .lane-label {
    position: absolute;
    left: 14px;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: #7df9ff;
    opacity: .8;
  }
  .lane-kernel { top: 14px; }
  .lane-user { top: 150px; }
  .lane-disk { top: 270px; }

  .divider {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(125,249,255,0.15);
  }
  .div1 { top: 110px; }
  .div2 { top: 235px; }

  .node {
    position: absolute;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: .5px;
    text-align: center;
    border: 1px solid var(--c);
    color: var(--c);
    text-shadow: 0 0 6px var(--c);
    box-shadow: 0 0 10px var(--glow);
    background: rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity .5s ease, box-shadow .5s ease, border-color .5s ease;
  }
  .node.show { opacity: 1; }
  .node.killed {
    border-color: #555 !important;
    color: #555 !important;
    text-shadow: none !important;
    box-shadow: none !important;
  }
  .node .strike {
    position: absolute;
    left: -6px; right: -6px; top: 50%;
    height: 2px;
    background: #ff2bd6;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .4s ease;
    box-shadow: 0 0 8px #ff2bd6;
  }
  .node.killed .strike { transform: scaleX(1); }

  .driver-node    { left: 50%; transform: translateX(-50%); top: 30px; width: 220px; --c:#ffae00; --glow:rgba(255,174,0,.4); }
  .attacker-node  { left: 30px; top: 168px; width: 140px; --c:#ff2bd6; --glow:rgba(255,43,214,.4); }
  .edr-node       { left: 380px; top: 168px; width: 170px; --c:#00f7ff; --glow:rgba(0,247,255,.4); }
  .ransom-node    { left: 620px; top: 168px; width: 180px; --c:#39ff14; --glow:rgba(57,255,20,.4); }
  .disk-node      { left: 50%; transform: translateX(-50%); top: 282px; width: 260px; --c:#7df9ff; --glow:rgba(125,249,255,.4); }

  .beam {
    position: absolute;
    height: 2px;
    background: var(--bc);
    box-shadow: 0 0 8px var(--bc);
    transform-origin: left center;
    opacity: 0;
    transition: opacity .4s ease;
  }
  .beam.show { opacity: 1; }
  .beam-dash {
    background: repeating-linear-gradient(90deg, var(--bc) 0 6px, transparent 6px 12px);
  }

  .pulse-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--bc);
    box-shadow: 0 0 10px var(--bc);
    opacity: 0;
  }
  .pulse-dot.run {
    animation: travel 1.1s linear forwards;
  }
  @keyframes travel {
    0% { opacity: 1; left: var(--x1); top: var(--y1); }
    100% { opacity: 1; left: var(--x2); top: var(--y2); }
  }

  /* ---- Controles ---- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: transparent;
    border: 1.5px solid #00f7ff;
    color: #00f7ff;
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: 0 0 5px #00f7ff;
    box-shadow: 0 0 12px rgba(0,247,255,0.35);
    transition: all .2s ease;
  }
  .ctrl-btn:hover { background: rgba(0,247,255,0.1); }
  .ctrl-btn:disabled { opacity: .3; cursor: default; }

  .step-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid #555;
    transition: all .25s ease;
  }
  .dot.active { background: #ff2bd6; border-color: #ff2bd6; box-shadow: 0 0 8px #ff2bd6; }
  .dot.done { background: #00f7ff; border-color: #00f7ff; }

  .caption-box {
    border: 1px solid #00f7ff;
    border-radius: 8px;
    padding: 14px 18px;
    min-height: 70px;
    box-shadow: 0 0 14px rgba(0,247,255,0.25), inset 0 0 16px rgba(0,247,255,0.06);
    font-size: 13px;
    line-height: 1.6;
    color: #c8faff;
  }
  .caption-box strong { color: #00f7ff; text-shadow: 0 0 5px #00f7ff; }
  .step-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: #ff2bd6;
    border: 1px solid #ff2bd6;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 8px;
    text-shadow: 0 0 5px #ff2bd6;
  }

  footer {
    text-align: center;
    margin-top: 22px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #ff9be8;
    opacity: .7;
  }
</style>
</head>
<body>
<div class="hud-frame">
  <h1>EDR KILLER</h1>
  <div class="subtitle">ANIMACIÓN DE FUNCIONAMIENTO // TÉCNICA BYOVD</div>
  <div class="scanline"></div>

  <div class="stage" id="stage">
    <div class="divider div1"></div>
    <div class="divider div2"></div>
    <div class="lane-label lane-kernel">KERNEL SPACE</div>
    <div class="lane-label lane-user">USER SPACE / PROCESOS</div>
    <div class="lane-label lane-disk">DISCO</div>

    <div class="node driver-node" id="n-driver">DRIVER FIRMADO<br>VULNERABLE (BYOVD)</div>
    <div class="node attacker-node" id="n-attacker">PROCESO<br>ATACANTE</div>
    <div class="node edr-node" id="n-edr">AGENTE EDR<div class="strike"></div></div>
    <div class="node ransom-node" id="n-ransom">PAYLOAD<br>RANSOMWARE</div>
    <div class="node disk-node" id="n-disk">ARCHIVOS DEL SISTEMA</div>

    <div class="beam" id="b-load" style="--bc:#ffae00; left:100px; top:90px; width:200px;"></div>
    <div class="beam beam-dash" id="b-kill" style="--bc:#ff2bd6; left:170px; top:178px; width:200px;"></div>
    <div class="beam beam-dash" id="b-run" style="--bc:#39ff14; left:520px; top:178px; width:90px;"></div>
    <div class="beam beam-dash" id="b-enc" style="--bc:#7df9ff; left:480px; top:230px; width:70px; transform:rotate(35deg);"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" onclick="prevStep()">◀ ANTERIOR</button>
    <div class="step-dots" id="dots"></div>
    <button class="ctrl-btn" id="nextBtn" onclick="nextStep()">SIGUIENTE ▶</button>
    <button class="ctrl-btn" onclick="resetSim()">⟲ REINICIAR</button>
  </div>

  <div class="caption-box" id="caption"></div>

  <footer>HAZ CLIC EN SIGUIENTE PARA AVANZAR LA SECUENCIA · CONCEPTO: KILLERS DE EDR</footer>
</div>

<script>
const steps = [
  {
    tag: "PASO 1 / 5",
    text: "<strong>Punto de partida:</strong> el atacante ya tiene un proceso ejecutándose en el equipo (post-explotación o tras comprar acceso vía IAB). El Agente EDR está activo y monitoreando procesos, memoria y red.",
    show: ["n-driver:dim", "n-attacker", "n-edr", "n-disk"]
  },
  {
    tag: "PASO 2 / 5",
    text: "<strong>Carga del driver vulnerable (BYOVD):</strong> el atacante instala un controlador (.sys) legítimamente firmado por un proveedor de confianza, pero con una vulnerabilidad conocida que permite ejecutar código arbitrario en el kernel.",
    show: ["n-driver", "n-attacker", "n-edr", "n-disk"],
    beams: ["b-load"]
  },
  {
    tag: "PASO 3 / 5",
    text: "<strong>Escalamiento a kernel:</strong> al estar firmado, Windows confía en el driver y lo carga sin alertas. Desde el kernel, el atacante obtiene privilegios superiores a los del propio agente EDR, que normalmente opera en modo usuario o con protecciones limitadas.",
    show: ["n-driver", "n-attacker", "n-edr", "n-disk"],
    beams: ["b-load"]
  },
  {
    tag: "PASO 4 / 5",
    text: "<strong>Neutralización del EDR:</strong> usando el acceso a kernel, el atacante termina el proceso del agente EDR, deshabilita sus controladores de protección o bloquea sus llamadas al sistema. El endpoint queda ciego.",
    show: ["n-driver", "n-attacker", "n-edr:killed", "n-disk"],
    beams: ["b-kill"]
  },
  {
    tag: "PASO 5 / 5",
    text: "<strong>Ejecución libre del payload:</strong> sin telemetría ni bloqueo activo, el ransomware (o cualquier payload) se ejecuta y cifra archivos sin generar alertas, ya que el sensor que debía detectarlo fue desactivado primero.",
    show: ["n-driver", "n-attacker", "n-edr:killed", "n-ransom", "n-disk"],
    beams: ["b-kill", "b-run", "b-enc"]
  }
];

let current = 0;

function renderDots() {
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  steps.forEach((s, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === current ? " active" : (i < current ? " done" : ""));
    dots.appendChild(d);
  });
}

function applyStep() {
  document.querySelectorAll(".node").forEach(n => { n.classList.remove("show", "killed"); n.style.opacity = ""; });
  document.querySelectorAll(".beam").forEach(b => b.classList.remove("show"));

  const step = steps[current];
  step.show.forEach(item => {
    const [id, mod] = item.split(":");
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add("show");
    if (mod === "killed") el.classList.add("killed");
    if (mod === "dim") el.style.opacity = "0.25";
  });

  if (step.beams) {
    step.beams.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add("show");
    });
  }

  document.getElementById("caption").innerHTML =
    `<div class="step-tag">${step.tag}</div><div>${step.text}</div>`;

  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = current === steps.length - 1;
  renderDots();
}

function nextStep() { if (current < steps.length - 1) { current++; applyStep(); } }
function prevStep() { if (current > 0) { current--; applyStep(); } }
function resetSim() { current = 0; applyStep(); }

applyStep();
</script>
</body>
</html>
