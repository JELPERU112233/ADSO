  <button class="dbtn" onclick="sendPrompt('¿Cómo funciona exactamente el self-healing de Windows Installer? ¿Qué detecta, qué tablas consulta y cuándo se activa?')">Self-healing detalle ↗</button>
  <button class="dbtn" onclick="sendPrompt('Diferencia técnica entre msiexec.exe en modo usuario y TrustedInstaller en modo SYSTEM durante la instalación MSI')">User vs SYSTEM ↗</button>
</div>

</div>

<script>
const data={
  server:{icon:"▣",title:"Server — repositorio",body:"Origen del paquete MSI. Puede ser servidor de red SMB, WSUS, SCCM/Intune o carpeta local. El circuito de comunicación RED gestiona la transmisión completa del archivo .msi al cliente antes de iniciar cualquier instalación.",tags:["SMB/HTTP","WSUS","SCCM","Intune","Descarga .msi"]},
  msi:{icon:"◈",title:"Paquete .msi — OLE-DB Storage",body:"Archivo que es una base de datos relacional Microsoft (OLE Structured Storage). Contiene streams binarios con tablas: Directory, Component, File, InstallExecuteSequence, Registry, Condition, CustomAction. También empaqueta un CAB con los binarios del producto.",tags:["OLE-DB","CAB embebido","Property","Feature","Component","CustomAction"]},
  usermode:{icon:"◉",title:"Modo usuario — msiexec.exe",body:"Fase 2 de adquisición. msiexec.exe mapea las tablas MSI a memoria del cliente usando SQL COM. Evalúa LaunchCondition, resuelve Features, ejecuta la UI Sequence y escribe TARGETDIR e INSTALLLEVEL en tabla Property.",tags:["InstallUISequence","SQL COM","TARGETDIR","INSTALLLEVEL","Dialog table","LaunchCondition"]},
  uac:{icon:"◆",title:"UAC — elevación de privilegios",body:"Antes de delegar al servicio TrustedInstaller, msiexec solicita elevación UAC mostrando el prompt de consentimiento. El token elevado permite escribir en directorios protegidos del sistema y en HKLM del Registro.",tags:["UAC prompt","Token elevado","HKLM write","Admin consent","ShellExecute runas"]},
  sysmode:{icon:"◎",title:"Modo sistema — TrustedInstaller",body:"El motor delega la ejecución al servicio TrustedInstaller que corre con privilegio SYSTEM. Genera primero el Script de Ejecución y luego ejecuta la InstallExecuteSequence: copia archivos, escribe registro, registra COM servers.",tags:["TrustedInstaller","SYSTEM token","InstallExecuteSequence","Script ejecucion","WRP bypass"]},
  progfiles:{icon:"▤",title:"Program Files — tabla File",body:"TrustedInstaller copia los archivos extraídos del CAB embebido a los directorios resueltos desde la tabla Directory. Cada archivo tiene hash MD5 para verificación de integridad, usada también por el self-healing.",tags:["Tabla File","Tabla Directory","CAB extraccion","Hash MD5","ComponentKeyPath"]},
  registry:{icon:"▥",title:"Registro de Windows — tabla Registry",body:"Todas las claves declaradas en la tabla Registry del MSI se escriben en HKLM o HKCU según el atributo Root. Las claves de desinstalación se generan automáticamente en HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall.",tags:["Tabla Registry","HKLM","HKCU","Uninstall keys","COM registration"]},
  localdb:{icon:"◫",title:"Local DB — C:\\Windows\\Installer",body:"El motor guarda una copia del .msi y registra ProductCode, UpgradeCode y ComponentIDs en la base de datos interna del instalador de Windows. Imprescindible para desinstalación, reparación y self-healing.",tags:["ProductCode","UpgradeCode","ComponentID","C:\\Windows\\Installer","Add/Remove Programs"]},
  rollback:{icon:"↩",title:"Rollback — reversión transaccional",body:"Si cualquier acción de InstallExecuteSequence falla, el motor ejecuta el Script de Rollback pre-generado. Cada operación tiene su inversa grabada: archivos copiados se eliminan, claves escritas se borran. La instalación es atómica.",tags:["Script rollback","Transaccion atomica","Idempotente","Error handler","Revert"]},
  msifile:{icon:"◪",title:"MSI File — caché local",body:"Copia del paquete .msi en C:\\Windows\\Installer. Usada por el self-healing para reparar componentes sin el medio original. También la requieren Add/Remove Features y la desinstalación completa.",tags:["Cache offline","Add features","Remove features","Desinstalacion","Reparacion"]},
  selfheal:{icon:"↻",title:"Self-healing — autoreparación",body:"En cada lanzamiento del producto, Windows Installer verifica la integridad de componentes comparando ComponentIDs con la Local DB. Si detecta archivo faltante, clave ausente o COM roto, re-ejecuta silenciosamente usando el MSI cacheado.",tags:["ComponentID check","File hash verify","Registry check","COM repair","Silencioso"]}
};
function tip(k){
  const d=data[k];if(!d)return;
  document.getElementById('tip-icon').textContent=d.icon;
  document.getElementById('tip-title').textContent=d.title;
  document.getElementById('tip-body').textContent=d.body;
  document.getElementById('tip-tags').innerHTML=d.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('tip-box').style.display='block';
}
</script>
