<script>
const D={
  repo:{icon:"▣",title:"Repositorio remoto — Red Hat Network",body:"Servidor origen que almacena índices, firmas GPG y paquetes .rpm. Puede ser cdn.redhat.com (subscripción activa), un mirror corporativo, o un repositorio local Satellite/Foreman. Expone los metadatos vía HTTPS en rutas estandarizadas.",tags:["cdn.redhat.com","RHSM","Satellite","Mirror","BaseURL"]},
  indices:{icon:"◈",title:"Indices — repomd.xml y primary.xml.gz",body:"El archivo repomd.xml es el índice raíz del repositorio: lista checksums de primary.xml.gz (catálogo de todos los paquetes), filelists.xml.gz (archivos por paquete) y other.xml.gz (changelogs). YUM los descarga primero para construir el grafo de dependencias sin descargar los .rpm.",tags:["repomd.xml","primary.xml.gz","filelists.xml.gz","SHA256","Metadatos"]},
  gpg:{icon:"◆",title:"Firmas Digitales — RPM-GPG-KEY",body:"Cada .rpm está firmado con la clave privada GPG de Red Hat. Antes de instalar, YUM verifica la firma contra la clave pública importada en /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release. Si la verificación falla, la instalación se aborta.",tags:["GPG","/etc/pki/rpm-gpg/","RPM-GPG-KEY-redhat","gpgcheck=1","Firma SHA256"]},
  rpms:{icon:"◉",title:"Paquetes Binarios — archivos .rpm",body:"Los paquetes .rpm contienen binarios compilados para la arquitectura objetivo (x86_64, aarch64), scripts pre/post instalación, metadatos de dependencias y la firma GPG. YUM sólo los descarga tras resolver el grafo completo de dependencias.",tags:[".rpm","NEVRA","Requires","Provides","Pre/Post scripts"]},
  https:{icon:"◎",title:"HTTPS/SSL — Conexión segura RHN",body:"Todo el tráfico entre el cliente y cdn.redhat.com va cifrado en TLS 1.2/1.3 por el puerto 443. La autenticación se realiza con el certificado de subscripción RHSM almacenado en /etc/pki/consumer/. Sin subscripción activa, el servidor devuelve 403.",tags:["TLS 1.3","Puerto 443","RHSM cert","/etc/pki/consumer/","RHN Subscription"]},
  cmd:{icon:"▶",title:"$ sudo yum update — punto de entrada",body:"El usuario o sistema (cron, Ansible) ejecuta sudo yum update. El binario /usr/bin/yum (Python o DNF según versión RHEL) lee la configuración de /etc/yum.conf, carga los plugins activos y delega al motor de resolución.",tags:["sudo","yum update","dnf upgrade","yum.conf","plugins"]},
  yum:{icon:"◐",title:"YUM / DNF Engine — /usr/bin/yum",body:"El motor central: lee los archivos .repo, descarga metadatos, construye el grafo de dependencias usando el SAT solver (libsolv en DNF), calcula el conjunto mínimo de paquetes a instalar/actualizar, verifica GPG y ejecuta las transacciones RPM.",tags:["libsolv","SAT solver","rpm -U","Transaction","depsolve"]},
  reposlist:{icon:"◫",title:"Repos List — /etc/yum.repos.d/*.repo",body:"Directorio con archivos .repo que definen los repositorios habilitados. Cada archivo puede contener múltiples secciones [repoid] con parámetros: baseurl, mirrorlist, enabled, gpgcheck, gpgkey. YUM carga todos los archivos *.repo al inicio.",tags:["/etc/yum.repos.d/","baseurl","mirrorlist","gpgcheck","enabled=1"]},
  rpgpg:{icon:"◆",title:"RPM-GPG-KEY — /etc/pki/rpm-gpg/",body:"Directorio con las claves públicas GPG importadas. La clave RPM-GPG-KEY-redhat-release es la oficial de Red Hat. Se importa con rpm --import. El parámetro gpgcheck=1 en el .repo activa la verificación obligatoria.",tags:["rpm --import","gpgkey=","RPM-GPG-KEY-redhat","gpgcheck=1","/etc/pki/rpm-gpg/"]},
  sources:{icon:"◪",title:"Sources List — /etc/cache.repos.list",body:"Archivo de caché con la lista sincronizada de repositorios activos y sus metadatos descargados. YUM lo usa para evitar re-descargar índices en cada ejecución si el TTL no ha expirado (configurado en yum.conf con metadata_expire).",tags:["/etc/cache.repos.list","metadata_expire","TTL","Sincronizacion","Offline mode"]},
  cache:{icon:"▤",title:"Cache de Indices — /var/cache/yum/",body:"Directorio donde YUM almacena los metadatos descargados (repomd.xml, primary.xml.gz, filelists) y los .rpm descargados pero aún no instalados. yum clean all borra esta caché. Mejora drásticamente el rendimiento de ejecuciones sucesivas.",tags:["/var/cache/yum/","/var/cache/dnf/","yum clean all","keepcache=1","Metadatos locales"]},
  updates:{icon:"✓",title:"X paquetes actualizables — resultado",body:"YUM presenta la lista de paquetes con nueva versión disponible: nombre, versión actual vs nueva, tamaño de descarga. El usuario confirma con 'y' o se fuerza con -y. YUM descarga los .rpm, verifica GPG, resuelve conflictos y ejecuta las transacciones RPM en orden topológico.",tags:["Lista updates","Confirmacion","rpm -U","Post-install scripts","yum history"]}
};
function tip(k){
  const d=D[k];if(!d)return;
  document.getElementById('tip-icon').textContent=d.icon;
  document.getElementById('tip-title').textContent=d.title;
  document.getElementById('tip-body').textContent=d.body;
  document.getElementById('tip-tags').innerHTML=d.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('tipbox').style.display='block';
}
</script>
