const STEPS = [
  {
    badge:"Inicio", bc:"#534AB7", bb:"#EEEDFE",

  const el=document.getElementById(id);
  if(!el)return;
  if(active){el.setAttribute("stroke","#7C6FF7");el.style.strokeOpacity="1";el.setAttribute("stroke-width","1.5");}
  else{el.setAttribute("stroke","#2a2a2e");el.style.strokeOpacity="0.6";el.setAttribute("stroke-width","1");}
}
function setRing(id,active){
  const el=document.getElementById(id);
  if(!el)return;
  el.style.opacity=active?"1":"0";
  if(active) el.style.animation="pulse-ring 1.2s ease-in-out infinite";
  else el.style.animation="none";
}
function animatePkt(pktId,pathId,duration,cb){
  if(!pktId||!pathId)return cb&&cb();
  const pkt=document.getElementById(pktId);
  const path=document.getElementById(pathId);
  if(!pkt||!path)return cb&&cb();
  pkt.style.display="block";
  const len=path.getTotalLength();
  let start=null;
  function step(ts){
    if(!start)start=ts;
    const prog=Math.min((ts-start)/duration,1);
    const pt=path.getPointAtLength(prog*len);
    pkt.setAttribute("transform",`translate(${pt.x},${pt.y})`);
    pkt.style.opacity=prog>0.85?(1-((prog-0.85)/0.15)):1;
    if(prog<1)requestAnimationFrame(step);
    else{pkt.style.display="none";cb&&cb();}
  }
  requestAnimationFrame(step);
}
function showMsg(step){
  const m=step.msg;
  const bg=document.getElementById("msg-bg");
  const txt=document.getElementById("msg-txt");
  const ov=document.getElementById("msg-overlay");
  bg.setAttribute("fill",m.fill);
  txt.textContent=m.text;
  ov.style.opacity="1";
  ov.style.animation="fade-in 0.4s ease";
}
function hideMsg(){document.getElementById("msg-overlay").style.opacity="0";}

function render(){
  const s=STEPS[cur];
  ALL_LINES.forEach(id=>setLine(id,s.lines.includes(id)));
  ALL_RINGS.forEach(id=>setRing(id,s.rings.includes(id)));
  hideMsg();
  if(s.pkt&&s.ppath){
    if(animTimer)clearTimeout(animTimer);
    animTimer=setTimeout(()=>{
      showMsg(s);
      animatePkt(s.pkt,s.ppath,900,null);
    },300);
  } else {
    if(s.msg)showMsg(s);
  }
  const bdg=document.getElementById("sbadge");
  bdg.textContent=s.badge;
  bdg.style.background=s.bb; bdg.style.color=s.bc;
  document.getElementById("ititle").textContent=s.title;
  document.getElementById("ibody").textContent=s.body;
  document.getElementById("cbox").textContent=s.code;
  document.getElementById("askbtn").textContent="Profundizar: "+s.ask+" ↗";
  document.getElementById("pbtn").disabled=cur===0;
  document.getElementById("nbtn").disabled=cur===STEPS.length-1;
  document.getElementById("ctr").textContent=(cur+1)+"/"+STEPS.length;
  document.querySelectorAll(".pill").forEach((p,i)=>{
    p.classList.toggle("active",i===cur);
    p.classList.toggle("done",i<cur);
  });
}

function go(d){
  cur=Math.max(0,Math.min(STEPS.length-1,cur+d));
  render();
}
function doAsk(){sendPrompt(STEPS[cur].ask);}

function togglePlay(){
  playing=!playing;
  const ic=document.getElementById("play-icon");
  if(playing){
    ic.className="ti ti-player-pause";
    function advance(){
      if(!playing)return;
      if(cur<STEPS.length-1){cur++;render();timer=setTimeout(advance,3500);}
      else{playing=false;ic.className="ti ti-player-play";}
    }
    timer=setTimeout(advance,3500);
  } else {
    ic.className="ti ti-player-play";
    clearTimeout(timer);
  }
}

const pe=document.getElementById("pills");
STEPS.forEach((_,i)=>{
  const p=document.createElement("div");
  p.className="pill"; p.title="Paso "+(i+1);
  p.onclick=()=>{cur=i;render();};
  pe.appendChild(p);
});
render();
</script>
