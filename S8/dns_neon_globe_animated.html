
<style>
* { box-sizing: border-box; }
@keyframes neonPulse { 0%,100%{opacity:1} 50%{opacity:.75} }
@keyframes modalIn { from{opacity:0;transform:scale(.94) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes globeSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes globePulse { 0%,100%{opacity:1} 50%{opacity:.7} }
@keyframes meridianScroll { from{stroke-dashoffset:0} to{stroke-dashoffset:-120} }

.wrap { background:#050d1a; border-radius:14px; padding:10px 8px 14px; position:relative; }
.step-bar { display:flex; gap:5px; flex-wrap:wrap; align-items:center; margin-bottom:10px; padding:0 4px; }
.sbtn { cursor:pointer; padding:4px 10px; font-size:11px; border-radius:5px; border:1px solid #1a4a6e; background:#071525; color:#4db8ff; transition:all .15s; font-family:monospace; }
.sbtn:hover { background:#0d2540; border-color:#4db8ff; }
.sbtn.active { background:#0a2a4a; border-color:#00d4ff; color:#00d4ff; box-shadow:0 0 8px #00d4ff66; }
.hint-txt { font-size:11px; font-family:monospace; color:#3a7a9c; text-align:center; margin-bottom:6px; }

.globe-outer { animation: globePulse 2.5s ease-in-out infinite; }
.globe-spin-group { transform-origin: 578px 68px; animation: globeSpin 6s linear infinite; }
.meridian-line { stroke-dasharray: 8 5; animation: meridianScroll 3s linear infinite; }

.modal-overlay { display:none; min-height:300px; background:rgba(0,5,15,.88); border-radius:14px; align-items:center; justify-content:center; margin-top:8px; }
.modal-overlay.open { display:flex; }
.modal-card { background:#071828; border:1px solid #00d4ff; border-radius:12px; padding:20px 22px; max-width:560px; width:94%; box-shadow:0 0 24px #00d4ff44,0 0 60px #00d4ff18; animation:modalIn .22s ease; position:relative; }
.modal-title { font-size:15px; font-weight:600; color:#00d4ff; font-family:monospace; margin:0 0 10px; text-shadow:0 0 8px #00d4ffaa; }
.modal-body { font-size:13px; color:#a8d4ec; line-height:1.65; font-family:monospace; margin:0 0 12px; }
.modal-example { background:#030d1a; border:1px solid #1a4a6e; border-radius:8px; padding:10px 12px; font-size:12px; color:#4db8ff; font-family:monospace; line-height:1.6; }
.modal-example strong { color:#00ffcc; }
.modal-close { position:absolute; top:10px; right:12px; cursor:pointer; color:#3a7a9c; font-size:18px; background:none; border:none; line-height:1; transition:color .15s; }
.modal-close:hover { color:#00d4ff; }
.info-strip { font-size:11px; font-family:monospace; color:#2a6a8c; background:#030d1a; border-radius:6px; padding:7px 10px; margin-top:8px; line-height:1.5; border:1px solid #0d2540; min-height:36px; }
.info-strip span { color:#00d4ff; }
.nnode { cursor:pointer; }
.nnode:hover rect, .nnode:hover ellipse { filter:brightness(1.25); }
</style>

<script>
const MODALS = {
  pc1: {
    title:'🖥  PC1 — Cliente DNS',
    body:'PC1 es el equipo del usuario final que genera la consulta DNS. Cuando escribes una URL en el navegador, el sistema operativo llama al resolver local, que reenvía la pregunta al servidor DNS configurado (generalmente por DHCP). PC1 no sabe nada de raíces ni TLDs — solo pregunta y espera la IP de respuesta.',
    example:'<strong>Ejemplo:</strong> El usuario escribe microsoft.com en Chrome.\n→ Windows llama a WSA (Winsock) → consulta al 192.168.1.1\n→ Espera la respuesta con la IP: <strong>20.112.52.29</strong>'
  },
  cluster: {
    title:'🗄  Clúster DNS local',
    body:'Un clúster de servidores DNS locales agrupa dos o más instancias para garantizar alta disponibilidad y balanceo de carga. Si DNS-1 falla, DNS-2 o DNS-3 siguen respondiendo. En Windows Server se implementa con zonas primaria/secundaria o con DNS integrado en Active Directory.',
    example:'<strong>Ejemplo en Windows Server AD:</strong>\nDNS-1 (DC primario): 10.0.0.1\nDNS-2 (DC secundario): 10.0.0.2\nDNS-3 (sitio remoto): 10.0.1.1\n→ Si cae DNS-1, los clientes con DNS-2 como alternativo siguen resolviendo sin interrupción.'
  },
  sdns: {
    title:'⚙  Servidor DNS local',
    body:'El servidor DNS local es el resolvedor recursivo de la organización. Recibe consultas de los clientes, revisa su caché, y si no tiene la respuesta inicia la resolución iterativa usando las root hints. Actúa como intermediario entre los equipos internos e Internet.',
    example:'<strong>Ejemplo en BIND9:</strong>\n$ dig @localhost microsoft.com\n→ DNS local revisa caché: MISS\n→ Consulta root hint 198.41.0.4\n→ Recibe delegación a .com TLD\n→ Retorna: microsoft.com. IN A 20.112.52.29'
  },
  roothints: {
    title:'📋  Sugerencias de raíz (Root Hints)',
    body:'Las root hints contienen los nombres y las IPs de los 13 clústeres de servidores raíz mundiales (A a M). Son el punto de partida para cualquier consulta que el servidor DNS no pueda resolver con su caché. Sin este archivo, el DNS no sabría a quién preguntar.',
    example:'<strong>Extracto de named.root (IANA):</strong>\n.  3600000  IN  NS  A.ROOT-SERVERS.NET.\nA.ROOT-SERVERS.NET.  A   198.41.0.4\nA.ROOT-SERVERS.NET.  AAAA 2001:503:ba3e::2:30\n...\nM.ROOT-SERVERS.NET.  A   202.12.27.33\n\n<strong>Windows Server:</strong> DNS Manager → Propiedades → "Sugerencias de raíz"'
  },
  internet: {
    title:'🌐  Internet — Red global',
    body:'Internet es la infraestructura de red global que interconecta millones de redes. En el contexto DNS, es el medio por el cual el servidor DNS local alcanza los servidores raíz y TLD. Usa el protocolo IP con ruteo anycast para seleccionar automáticamente el servidor raíz más cercano geográficamente.',
    example:'<strong>¿Cómo llega la consulta al servidor raíz?</strong>\nEl paquete UDP sale por el gateway de la red local\n→ Atraviesa el ISP (Claro, Telefónica, etc.)\n→ Ruteo BGP en Internet\n→ Llega al clúster raíz más cercano (anycast)\n\n<strong>Puerto DNS:</strong> UDP/TCP 53\n<strong>Latencia típica:</strong> 5–30 ms hacia servidores raíz'
  },
  root: {
    title:'🌐  Clúster de servidores raíz (.)',
    body:'Los 13 clústeres raíz (A–M) son la cima de la jerarquía DNS. No resuelven nombres directamente, sino que delegan a los servidores TLD. Cada letra representa un clúster operado por una organización diferente (ICANN, Verisign, RIPE NCC, NASA). Físicamente son cientos de servidores en todo el mundo vía anycast.',
    example:'<strong>Operadores principales:</strong>\nA → Verisign (198.41.0.4)\nB → USC-ISI (199.9.14.201)\nC → Cogent (192.33.4.12)\nK → RIPE NCC (193.0.14.129)\nM → WIDE Project, Japón (202.12.27.33)\n\n$ dig . NS @198.41.0.4\n→ Lista los 13 servidores raíz'
  },
  tld: {
    title:'📂  Servidor TLD — .com',
    body:'Los servidores TLD (Top Level Domain) gestionan los dominios de primer nivel: .com, .net, .org, .pe, etc. El TLD .com está operado por Verisign. Recibe la consulta del resolvedor y devuelve la dirección del servidor autoritativo responsable del dominio específico.',
    example:'<strong>Delegación desde el TLD:</strong>\n$ dig microsoft.com @a.gtld-servers.net\n→ TLD .com no resuelve directamente\n→ Devuelve: "Pregunta a ns1.msft.net"\n\n<strong>Otros TLDs:</strong>\n.pe → NIC Perú\n.edu → EDUCAUSE\n.gov → US GSA'
  },
  microsoft: {
    title:'✅  Servidor autoritativo — microsoft.com',
    body:'El servidor autoritativo tiene la respuesta definitiva para el dominio. Es mantenido directamente por el propietario. Devuelve el registro A (IPv4) o AAAA (IPv6) con la IP real. El DNS local cachea la respuesta por el tiempo indicado en el TTL.',
    example:'<strong>Respuesta autoritativa real:</strong>\n$ dig microsoft.com @ns1.msft.net\n;; ANSWER SECTION:\nmicrosoft.com. 3600 IN A 20.112.52.29\nmicrosoft.com. 3600 IN A 20.81.111.85\n\n<strong>TTL = 3600</strong> → caché por 1 hora antes de re-consultar.'
  }
};

const ALL_A = ['ha1','ha2f','ha2r','ha3','ha4','ha5'];
const ALL_L = ['lq','lrh','ltld','lips'];

const STEPS = [
  { a:[], l:[], pkt:null, info:'<span>Sistema listo.</span> Vista general. Haz clic en cualquier componente para explorar su función.' },
  { a:['ha1'], l:['lq'], pkt:{from:{x:74,y:362},to:{x:160,y:290},c:'#00ffcc'}, info:'<span>Paso 1:</span> PC1 envía la consulta DNS al servidor local. Pregunta: ¿cuál es la IP de microsoft.com?' },
  { a:['ha1','ha2f','ha2r'], l:['lq'], pkt:{from:{x:134,y:230},to:{x:162,y:274},c:'#00aaff'}, info:'<span>Paso 2:</span> El servidor DNS consulta al clúster DNS local. El clúster no tiene la respuesta en caché.' },
  { a:['ha1','ha3'], l:['lq','lrh'], pkt:{from:{x:280,y:274},to:{x:476,y:168},c:'#ffaa00'}, info:'<span>Paso 3:</span> El servidor DNS usa las <span>root hints</span> para contactar un servidor raíz vía Internet.' },
  { a:['ha1','ha3','ha4'], l:['lq','lrh','ltld'], pkt:{from:{x:511,y:202},to:{x:511,y:276},c:'#cc44ff'}, info:'<span>Paso 4:</span> El servidor raíz delega al TLD <span>.com</span>. No conoce la IP pero sabe quién la tiene.' },
  { a:['ha1','ha3','ha4','ha5'], l:['lq','lrh','ltld','lips'], pkt:{from:{x:546,y:297},to:{x:566,y:297},c:'#00ff88'}, info:'<span>Paso 5:</span> El TLD .com apunta al servidor autoritativo de <span>microsoft.com</span>, que devuelve la IP. ¡Resolución completa!' }
];

let animT = null;

function go(n) {
  const s = STEPS[n];
  ALL_A.forEach(id => { const e=document.getElementById(id); if(e) e.setAttribute('opacity','0'); });
  ALL_L.forEach(id => { const e=document.getElementById(id); if(e) e.setAttribute('opacity','0'); });
  s.a.forEach(id => { const e=document.getElementById(id); if(e) e.setAttribute('opacity','1'); });
  s.l.forEach(id => { const e=document.getElementById(id); if(e) e.setAttribute('opacity','1'); });
  document.getElementById('info-strip').innerHTML = s.info;
  for(let i=0;i<6;i++) { const b=document.getElementById('b'+i); if(b) b.classList.toggle('active',i===n); }
  const pkt=document.getElementById('pkt');
  if(animT){ clearInterval(animT); animT=null; }
  pkt.setAttribute('opacity','0');
  if(s.pkt){
    const {from,to,c}=s.pkt;
    pkt.setAttribute('fill',c);
    let step=0, total=35;
    pkt.setAttribute('cx',from.x); pkt.setAttribute('cy',from.y); pkt.setAttribute('opacity','1');
    animT=setInterval(()=>{
      step++;
      const t=step/total;
      pkt.setAttribute('cx', from.x+(to.x-from.x)*t);
      pkt.setAttribute('cy', from.y+(to.y-from.y)*t);
      if(step>=total){ clearInterval(animT); animT=null; pkt.setAttribute('opacity','0'); }
    }, 600/total);
  }
}

function showModal(key) {
  const m=MODALS[key]; if(!m) return;
  document.getElementById('modal-title').textContent=m.title;
  document.getElementById('modal-body').textContent=m.body;
  document.getElementById('modal-example').innerHTML=m.example;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
</script>
